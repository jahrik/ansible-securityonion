---
# Stages a Security Onion appliance install: adds the (legacy) Ubuntu PPA,
# installs the securityonion-all metapackage, and templates sosetup.conf for
# the interactive setup wizard. The wizard itself and post-install steps are
# intentionally left commented out below -- see README.md / AGENTS.md for why.

- name: Add securityonion repo
  ansible.builtin.apt_repository:
    repo: "{{ securityonion_ppa }}"
    state: present
  when: ansible_facts['distribution'] == 'Ubuntu'
  tags:
    - securityonion
    - securityonion:apt

- name: Set debconf frontend to noninteractive
  ansible.builtin.debconf:
    name: debconf
    question: debconf/frontend
    value: noninteractive
    vtype: select
  when: ansible_facts['distribution'] == 'Ubuntu'
  tags:
    - securityonion
    - securityonion:apt

- name: Install packages
  ansible.builtin.apt:
    name: "{{ securityonion_packages }}"
    state: present
    update_cache: true
  when: ansible_facts['distribution'] == 'Ubuntu'
  tags:
    - securityonion
    - securityonion:apt

- name: Generate sosetup.conf
  ansible.builtin.template:
    src: sosetup.conf.j2
    dest: /etc/nsm/sosetup.conf
    owner: root
    group: root
    mode: "0600"
  no_log: true
  when: ansible_facts['distribution'] == 'Ubuntu'
  tags:
    - securityonion
    - securityonion:setup

